<!DOCTYPE html> <html lang="fr"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"> <meta name="apple-mobile-web-app-capable" content="yes"> <meta name="apple-mobile-web-app-title" content="Arrivage"> <title>Arrivage Marchandise — Dantesse</title> <style> :root{--bg:#0f0f0f;--s:#1a1a1a;--s2:#242424;--b:#2e2e2e;--a:#d4a843;--a2:#e8c97a;--t:#f0ede8;--m:#888;--err:#e05252;--ok:#52c47b;--r:14px} *{box-sizing:border-box;margin:0;padding:0} body{background:var(--bg);color:var(--t);font-family:system-ui,sans-serif;min-height:100dvh;display:flex;flex-direction:column} .hd{padding:14px 18px;background:var(--s);border-bottom:1px solid var(--b);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:9} .logo{font-size:11px;color:var(--a);letter-spacing:.12em;text-transform:uppercase;font-weight:700} .bdg{font-size:10px;color:var(--m);background:var(--s2);padding:3px 10px;border-radius:20px;border:1px solid var(--b)} .main{flex:1;padding:22px 18px 40px;display:flex;flex-direction:column;gap:18px;max-width:460px;margin:0 auto;width:100%} .lbl{font-size:10px;color:var(--a);letter-spacing:.14em;text-transform:uppercase;margin-bottom:9px;font-weight:700} .iw{background:var(--s);border:1.5px solid var(--b);border-radius:var(--r);padding:14px;transition:border-color .2s} .iw:focus-within{border-color:var(--a)} .iw input{width:100%;background:transparent;border:none;outline:none;font-size:22px;color:var(--t);caret-color:var(--a);font-family:system-ui,sans-serif} .iw input::placeholder{color:var(--b);font-size:18px} .hint{font-size:11px;color:var(--m);margin-top:5px} .date-pill{display:inline-flex;align-items:center;gap:6px;background:var(--s2);border:1px solid var(--b);border-radius:20px;padding:5px 12px;font-size:12px;color:var(--a2);margin-bottom:4px} .bc{background:var(--s);border:1.5px solid var(--b);border-radius:var(--r);padding:0;overflow:hidden;cursor:pointer;display:block;width:100%;-webkit-appearance:none;transition:border-color .2s} .bc.rdy{border-color:var(--a)} .bci{display:flex;align-items:center;gap:14px;padding:18px} .ci{width:50px;height:50px;background:var(--s2);border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:22px;transition:background .2s} .bc.rdy .ci{background:var(--a)} .ct{font-size:15px;font-weight:600;color:var(--t)} .cs{font-size:11px;color:var(--m);margin-top:2px} input[type=file]{display:none} .ph{display:none}.ph.on{display:block} .grd{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:9px} .th{aspect-ratio:1;border-radius:9px;overflow:hidden;position:relative;border:1.5px solid var(--b);background:var(--s2)} .th img{width:100%;height:100%;object-fit:cover;display:block} .tl{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.85));padding:12px 4px 5px;font-size:7.5px;color:var(--a2);text-align:center} .td{position:absolute;top:4px;right:4px;width:20px;height:20px;background:rgba(0,0,0,.7);border-radius:50%;border:none;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;cursor:pointer} .div{height:1px;background:var(--b)} .row{display:flex;gap:10px} .btn{border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer;padding:15px;-webkit-appearance:none} .bp{flex:1;background:var(--a);color:#0f0f0f} .bs{background:var(--s2);color:var(--t);border:1.5px solid var(--b);padding:15px 16px} .btn:disabled{opacity:.3} .ss{display:none}.ss.on{display:block} .sl{display:flex;flex-direction:column;gap:7px;margin-top:9px} .si{background:var(--s);border:1px solid var(--b);border-radius:11px;padding:13px 15px;display:flex;align-items:center;justify-content:space-between} .sc{font-size:13px;color:var(--t);font-weight:600} .sct{font-size:11px;color:var(--m)} .sok{font-size:10px;color:var(--ok);background:rgba(82,196,123,.12);padding:3px 8px;border-radius:20px} .bup{width:100%;background:var(--ok);color:#0f0f0f;padding:16px;font-size:15px;border-radius:var(--r);display:flex;align-items:center;justify-content:center;gap:9px;margin-top:13px;border:none;cursor:pointer;font-weight:600} .ib{background:var(--s);border:1px solid var(--b);border-radius:11px;padding:13px 15px;font-size:12px;color:var(--m);line-height:1.8;margin-top:9px} .ib strong{color:var(--t)} .stb{border-radius:var(--r);padding:13px 15px;font-size:13px;display:none;align-items:center;gap:9px} .stb.on{display:flex} .stb.info{background:rgba(212,168,67,.1);border:1px solid rgba(212,168,67,.25);color:var(--a2)} .stb.ok{background:rgba(82,196,123,.1);border:1px solid rgba(82,196,123,.25);color:var(--ok)} .stb.err{background:rgba(224,82,82,.1);border:1px solid rgba(224,82,82,.25);color:var(--err)} .stb.ld{background:var(--s2);border:1px solid var(--b);color:var(--m)} .sp{width:15px;height:15px;border:2px solid var(--b);border-top-color:var(--a);border-radius:50%;animation:sp .8s linear infinite;flex-shrink:0} @keyframes sp{to{transform:rotate(360deg)}} .pill{display:inline-flex;align-items:center;gap:5px;background:var(--s2);border:1px solid var(--b);border-radius:20px;padding:4px 11px;font-size:11px;color:var(--m);margin-top:9px} .pill span{color:var(--a);font-weight:700} .pw{margin-top:11px;display:none}.pw.on{display:block} .pt{background:var(--s2);border-radius:7px;height:4px;overflow:hidden} .pb{height:100%;background:var(--ok);width:0%;transition:width .3s;border-radius:7px} .prog-txt{font-size:11px;color:var(--m);margin-top:6px;text-align:center} </style> </head> <body> <div class="hd"><div class="logo">Dantesse · Arrivage</div><div class="bdg" id="bdg">Session vide</div></div> <div class="main"> <div class="stb" id="stb"><div class="sp" id="sp" style="display:none"></div><span id="stxt"></span></div> <div> <div class="date-pill">📅 <span id="todayLabel"></span></div> <div class="lbl">Fournisseur</div> <div class="iw"><input type="text" id="cd" placeholder="ex: Guyaux" autocapitalize="words"><div class="hint">Nom du fournisseur</div></div> </div> <div> <button class="bc" id="cb" onclick="document.getElementById('fi').click()"> <div class="bci"><div class="ci">📸</div><div><div class="ct">Prendre une photo</div><div class="cs" id="cs">Saisir un fournisseur d'abord</div></div></div> </button> <input type="file" id="fi" accept="image/*" capture="environment"> </div> <div class="ph" id="ph"> <div class="lbl">Photos capturees</div> <div class="pill">Fourn. <span id="al">-</span> · <span id="pc">0</span> photo(s)</div> <div class="grd" id="grd"></div> <div class="row" style="margin-top:13px"> <button class="btn bs" onclick="resetA()">✕</button> <button class="btn bp" onclick="saveA()">Fournisseur suivant →</button> </div></div> <div class="ss" id="ss"> <div class="div"></div> <div style="margin-top:18px"> <div class="lbl">Fournisseurs valides</div> <div class="sl" id="sl"></div> <div class="ib"><strong>☁ Upload vers Google Drive</strong><br>Les photos seront envoyees directement dans le dossier <strong>Arrivage</strong> de Drive.</div> <button class="btn bup" id="upb" onclick="uploadAll()">↑ Envoyer dans Google Drive</button> <div class="pw" id="pw"><div class="pt"><div class="pb" id="pb"></div></div><div class="prog-txt" id="ptxt"></div></div> </div></div> </div> <script> var SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx4XGJpN9uopbrCSDK_0cfEP1OZpNMJ6Maz3ydkAwFX7rurja1GSyZocRcbn_yJtVRRkQ/exec"; var P=[],S=[]; var cd=document.getElementById('cd'),fi=document.getElementById('fi'),cb=document.getElementById('cb'); function todayStr(){ var t=new Date(); return String(t.getDate()).padStart(2,'0')+String(t.getMonth()+1).padStart(2,'0')+t.getFullYear(); } document.getElementById('todayLabel').textContent = new Date().toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'}); function sanitize(s){ return s.trim().replace(/\s+/g,'-').replace(/[^a-zA-Z0-9\-]/g,''); } cd.addEventListener('input',function(){ var v=cd.value.trim(); if(v.length>=2){ cb.classList.add('rdy'); var clean=sanitize(v); document.getElementById('cs').textContent='Nommees: '+todayStr()+'_'+clean+'_1...'; }else{ cb.classList.remove('rdy'); document.getElementById('cs').textContent="Saisir un fournisseur d'abord"; } }); fi.addEventListener('change',function(e){ var c=cd.value.trim(); if(!c||c.length<2){st('Saisir un fournisseur avant.','err');return;} var clean=sanitize(c); var fs=Array.from(e.target.files);if(!fs.length)return; var n=fs.length; fs.forEach(function(f){ var r=new FileReader(); r.onload=function(){P.push({u:r.result,n:todayStr()+'_'+clean+'_'+(P.length+1)+'.jpg'});n--;if(!n){fi.value='';rP();}}; r.readAsDataURL(f); }); }); function rP(){ var c=cd.value.trim(),sec=document.getElementById('ph'); if(!P.length){sec.classList.remove('on');return;} sec.classList.add('on'); document.getElementById('al').textContent=c; document.getElementById('pc').textContent=P.length; var g=document.getElementById('grd');g.innerHTML=''; P.forEach(function(p,i){ var d=document.createElement('div');d.className='th'; d.innerHTML='<img src="'+p.u+'"><div class="tl">'+p.n+'</div><button class="td" onclick="dP('+i+')">✕</button>'; g.appendChild(d); }); } function dP(i){ var c=sanitize(cd.value.trim());P.splice(i,1); P=P.map(function(p,j){return{u:p.u,n:todayStr()+'_'+c+'_'+(j+1)+'.jpg'};});rP(); } function resetA(){P=[];document.getElementById('ph').classList.remove('on');} function saveA(){ var c=cd.value.trim(); if(!c||c.length<2){st('Nom de fournisseur invalide.','err');return;} if(!P.length){st('Aucune photo.','err');return;} var clean=sanitize(c); var ex=S.find(function(a){return a.c===c;}); if(ex){var s=ex.p.length+1;P.forEach(function(p,i){ex.p.push({u:p.u,n:todayStr()+'_'+clean+'_'+(s+i)+'.jpg'});});} else{S.push({c:c,p:P.slice()});} P=[];cd.value='';cb.classList.remove('rdy'); document.getElementById('cs').textContent="Saisir un fournisseur d'abord"; document.getElementById('ph').classList.remove('on'); rS();st('Fournisseur '+c+' ajoute','ok');setTimeout(clrSt,2000);cd.focus(); } function rS(){ var sec=document.getElementById('ss'),list=document.getElementById('sl'),bdg=document.getElementById('bdg'); if(!S.length){sec.classList.remove('on');bdg.textContent='Session vide';return;} sec.classList.add('on'); var tot=S.reduce(function(s,a){return s+a.p.length;},0); bdg.textContent=S.length+' fourn. - '+tot+' photos'; list.innerHTML=''; S.forEach(function(a,i){ var item=document.createElement('div');item.className='si'; item.innerHTML='<div><div class="sc">'+a.c+'</div><div class="sct">'+a.p.length+' photo(s)</div></div><div style="display:flex;gap:7px;align-items:center"><div class="sok">OK</div><button onclick="rmS('+i+')" style="background:none;border:none;color:var(--m);cursor:pointer;font-size:15px;padding:3px">✕</button></div>'; list.appendChild(item); }); } function rmS(i){var c=S[i].c;S.splice(i,1);rS();st('Fournisseur '+c+' retire.','info');setTimeout(clrSt,2000);} async function uploadAll(){ if(!S.length){st('Session vide.','err');return;} var btn=document.getElementById('upb');btn.disabled=true; var pw=document.getElementById('pw'),pb=document.getElementById('pb'),ptxt=document.getElementById('ptxt'); pw.classList.add('on');pb.style.width='0%'; var allPhotos=[]; S.forEach(function(a){a.p.forEach(function(p){allPhotos.push(p);});}); var total=allPhotos.length,done=0,errors=0; st('Upload en cours...','ld',true); for(var i=0;i<allPhotos.length;i++){ var photo=allPhotos[i]; ptxt.textContent=photo.n+' ('+(i+1)+'/'+total+')'; try{ var base64=photo.u.split(',')[1]; var resp=await fetch(SCRIPT_URL,{ method:'POST', body:JSON.stringify({name:photo.n,data:base64}) }); var result=await resp.json(); if(!result.success){errors++;} }catch(e){errors++;} done++; pb.style.width=Math.round(done/total*100)+'%'; } if(errors===0){ st('✓ '+total+' photo(s) envoyees dans Drive !','ok'); ptxt.textContent='Dossier : Arrivage'; setTimeout(function(){S=[];rS();pw.classList.remove('on');clrSt();ptxt.textContent='';},5000); } else { st(errors+' erreur(s) sur '+total+' photos.','err'); } btn.disabled=false; } function st(t,type,spin){ var b=document.getElementById('stb');b.className='stb on '+type; document.getElementById('stxt').textContent=t; document.getElementById('sp').style.display=spin?'block':'none'; } function clrSt(){document.getElementById('stb').className='stb';} </script> </body> </html>
